spring:
  datasource:
    url: "${AUCTION_DB_URL}"
    username: "${AUCTION_DB_USER}"
    password: "${AUCTION_DB_PASS}"
  data:
    redis:
      host: "${RD_HOST}"
      port: "${RD_PORT}"
      username: default
      password: "${RD_PASS}"
      ssl:
        enabled: true

  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: "https://auction-ct03.netlify.app/authenticate"


payment:
  vnPay:
    url: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
    tmnCode: "${VNPAY_TMN_CODE}"
    hashSecret: "${VNPAY_HASH_SECRET}"
    returnUrl: "https://auction-ct03.netlify.app/payment-result"
    transactionUrl: "https://sandbox.vnpayment.vn/merchant_webapi/api/transaction"